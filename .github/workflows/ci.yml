name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: artpulse_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d artpulse_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      AUTH_SECRET: ci-dummy-auth-secret
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/artpulse_ci?schema=public
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/artpulse_ci?schema=public
      NEXTAUTH_URL: http://127.0.0.1:3000
      CRON_SECRET: ci-dummy-cron-secret
      PERF_EXPLAIN_ENABLED: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Versions
        run: |
          echo "Git SHA: ${GITHUB_SHA}"
          node -v
          pnpm -v

      - name: Install dependencies
        timeout-minutes: 10
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        timeout-minutes: 5
        run: pnpm prisma:generate

      - name: Run safe Prisma deploy (capture logs)
        id: prisma_deploy
        timeout-minutes: 10
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm prisma:safe-deploy 2>&1 | tee prisma-safe-deploy.log

      - name: Migration failure diagnostics
        if: steps.prisma_deploy.outcome == 'failure'
        run: |
          echo "::group::Prisma deploy failure summary"
          echo "Failing command: pnpm prisma:safe-deploy"
          if [ -f prisma-safe-deploy.log ]; then
            failing_migration=$(grep -Eo "[0-9]{14}_[a-zA-Z0-9_]+" prisma-safe-deploy.log | tail -n 1)
            if [ -n "$failing_migration" ]; then
              echo "Detected failing migration: $failing_migration"
            else
              echo "Detected failing migration: <not parsed from log>"
            fi
            echo "--- Tail of prisma-safe-deploy output ---"
            tail -n 200 prisma-safe-deploy.log
          else
            echo "prisma-safe-deploy.log not found"
          fi
          echo "::endgroup::"

          echo "::group::Prisma migrate status (post-failure)"
          pnpm prisma migrate status || true
          echo "::endgroup::"

          echo "::group::_prisma_migrations snapshot"
          pnpm prisma db execute --url "$DIRECT_URL" --stdin <<'SQL' || true
          select to_regclass('public._prisma_migrations') as prisma_migrations_table;
          select migration_name, started_at, finished_at, rolled_back_at
          from public._prisma_migrations
          order by started_at desc nulls last, migration_name desc
          limit 20;
          SQL
          echo "::endgroup::"

          exit 1

      - name: Verify migration status
        if: steps.prisma_deploy.outcome == 'success'
        timeout-minutes: 5
        run: pnpm prisma migrate status

      - name: Build app
        timeout-minutes: 10
        run: pnpm build

      - name: Print Prisma version
        run: pnpm prisma --version

      - name: Validate DB URL hosts
        run: |
          node -e "console.log('DATABASE_URL host:', new URL(process.env.DATABASE_URL).hostname)"
          node -e "console.log('DIRECT_URL host:', new URL(process.env.DIRECT_URL).hostname)"
          node -e "process.exit(new URL(process.env.DIRECT_URL).hostname.includes('-pooler') ? 1 : 0)"

      - name: Assert CI DB is non-production
        run: |
          node -e "const host = new URL(process.env.DATABASE_URL).hostname; if (host !== '127.0.0.1' && host !== 'localhost') process.exit(1); console.log('CI database host validated:', host);"

      - name: Check migration FK ordering
        run: pnpm prisma:check-migration-order

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Check production env contract
        run: pnpm check-env
